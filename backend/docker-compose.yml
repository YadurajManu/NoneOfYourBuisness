version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: medlifecycle-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medlifecycle
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: medlifecycle-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
